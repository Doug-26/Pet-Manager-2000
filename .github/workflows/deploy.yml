name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PM2000.Angular/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: PM2000.Angular

      - name: Build
        run: npx ng build --base-href /Pet-Manager-2000/
        working-directory: PM2000.Angular

      - name: Copy index.html as 404.html for SPA routing
        run: cp PM2000.Angular/dist/PM2000.Angular/browser/index.html PM2000.Angular/dist/PM2000.Angular/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: PM2000.Angular/dist/PM2000.Angular/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
